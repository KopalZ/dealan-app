apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dealan-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service-svc
            port:
              number: 8081
      - path: /user
        pathType: Prefix
        backend:
          service:
            name: user-service-svc
            port:
              number: 8082
      - path: /driver
        pathType: Prefix
        backend:
          service:
            name: driver-service-svc
            port:
              number: 8083