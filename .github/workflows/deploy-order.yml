name: Build and Deploy Order Service

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v2
      with:
        registry: dealanregistry2026yazid.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23' # Use a recent Go version

    - name: Build Go binary
      run: |
        cd order-service
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main ./cmd/main.go

    - name: Build and push Order Service
      uses: docker/build-push-action@v5
      with:
        context: ./order-service
        file: ./order-service/Dockerfile
        push: true
        tags: dealanregistry2026yazid.azurecr.io/dealan-order-service:latest
