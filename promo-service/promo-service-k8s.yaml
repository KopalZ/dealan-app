apiVersion: apps/v1
kind: Deployment
metadata:
  name: promo-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promo-service
  template:
    metadata:
      labels:
        app: promo-service
    spec:
      containers:
        - name: promo-service
          image: kelompokdealan/promo-service:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: promo-service
spec:
  selector:
    app: promo-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP