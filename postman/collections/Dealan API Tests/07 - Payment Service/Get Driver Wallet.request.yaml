$kind: http-request
name: Get Driver Wallet
method: GET
url: 'http://localhost:3010/payments/driver/{{driverId}}/wallet'
order: 8000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has balance field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("balance"); });
