$kind: http-request
name: Get Payment - Not Found
method: GET
url: 'http://localhost:3010/payments/TRX-NOTEXIST-00000'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 404", function() { pm.response.to.have.status(404); });
      pm.test("Response has error field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("error"); });
