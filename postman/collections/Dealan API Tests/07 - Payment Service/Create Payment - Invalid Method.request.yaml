$kind: http-request
name: Create Payment - Invalid Method
method: POST
url: 'http://localhost:3010/payments/create'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "order_id": "{{orderId}}",
      "nominal": 50000,
      "metode_pembayaran": "bitcoin",
      "user_id": "{{userId}}",
      "driver_id": "{{driverId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function() { pm.response.to.have.status(400); });
      pm.test("Response has error field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("error"); });
