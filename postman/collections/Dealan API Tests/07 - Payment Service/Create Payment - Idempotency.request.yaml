$kind: http-request
name: Create Payment - Idempotency
method: POST
url: 'http://localhost:3010/payments/create'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Idempotency-Key
    value: idem-key-001
body:
  type: json
  content: |-
    {
      "order_id": "{{orderId}}",
      "nominal": 50000,
      "metode_pembayaran": "cash",
      "user_id": "{{userId}}",
      "driver_id": "{{driverId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 201", function() { pm.expect([200, 201]).to.include(pm.response.code); });
      pm.test("Response transaction_id matches previously saved one", function() { var json = pm.response.json(); pm.expect(json.transaction_id).to.eql(pm.environment.get("transactionId")); });
