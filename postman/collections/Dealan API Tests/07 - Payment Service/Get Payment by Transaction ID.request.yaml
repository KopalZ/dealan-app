$kind: http-request
name: Get Payment by Transaction ID
method: GET
url: 'http://localhost:3010/payments/{{transactionId}}'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has transaction_id", function() { var json = pm.response.json(); pm.expect(json).to.have.property("transaction_id"); });
