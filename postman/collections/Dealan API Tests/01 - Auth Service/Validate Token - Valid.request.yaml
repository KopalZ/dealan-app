$kind: http-request
name: Validate Token - Valid
method: POST
url: 'http://localhost:3001/auth/validate'
order: 6000
headers:
  - key: Authorization
    value: 'Bearer {{userToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has account_id", function() { var json = pm.response.json(); pm.expect(json).to.have.property("account_id"); });
      pm.test("Response has role", function() { var json = pm.response.json(); pm.expect(json).to.have.property("role"); });
