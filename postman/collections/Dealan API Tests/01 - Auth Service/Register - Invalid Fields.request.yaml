$kind: http-request
name: Register - Invalid Fields
method: POST
url: 'http://localhost:3001/auth/register'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "not-an-email",
      "password": "123",
      "role": "superadmin",
      "nama": "",
      "nomor_hp": ""
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function() { pm.response.to.have.status(400); });
      pm.test("Response has error field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("error"); });
