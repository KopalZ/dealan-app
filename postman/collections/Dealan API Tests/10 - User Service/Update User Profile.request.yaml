$kind: http-request
name: Update User Profile
method: PUT
url: 'http://localhost:3002/users/profile'
order: 2000
headers:
  - key: X-User-ID
    value: '{{userId}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nama": "Test User Updated",
      "nomor_hp": "081234567890",
      "alamat": "Jl. Merdeka No. 45"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has success message", function() { var json = pm.response.json(); pm.expect(json.message).to.eql("profil berhasil diperbarui"); });
