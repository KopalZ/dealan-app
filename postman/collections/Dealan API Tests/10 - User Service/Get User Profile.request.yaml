$kind: http-request
name: Get User Profile
method: GET
url: 'http://localhost:3002/users/profile'
order: 1000
headers:
  - key: X-User-ID
    value: '{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has id field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("id"); pm.expect(json.id).to.eql(pm.environment.get("userId")); });
