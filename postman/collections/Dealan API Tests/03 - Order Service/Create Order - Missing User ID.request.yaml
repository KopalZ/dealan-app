$kind: http-request
name: Create Order - Missing User ID
method: POST
url: 'http://localhost:3004/api/v1/orders/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "detail_paket": {
        "jenis": "send"
      }
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function() { pm.response.to.have.status(400); });
      pm.test("Response has error field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("error"); });
