$kind: http-request
name: Send Notification - Valid
method: POST
url: 'http://localhost:3011/notification/send'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "target_id": "{{userId}}",
      "title": "Order Confirmed",
      "body": "Your order has been confirmed and a driver is on the way.",
      "action_link": "/orders/{{orderId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has delivery_status field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("delivery_status"); });
