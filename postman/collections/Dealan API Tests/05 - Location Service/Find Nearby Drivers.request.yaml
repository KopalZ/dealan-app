$kind: http-request
name: Find Nearby Drivers
method: GET
url: 'http://localhost:3008/api/v1/locations/nearby?lat=-6.9175&lon=107.6191&radius=5000'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function() { pm.response.to.have.status(200); });
      pm.test("Response has data field", function() { var json = pm.response.json(); pm.expect(json).to.have.property("data"); });
